<!DOCTYPE html>
<html lang="es">
{% load static %}
<head>
    <meta charset="UTF-8">
    <title>Login - Ortizcorp</title>
    <link rel="stylesheet" href="{% static 'polls/css/theme.css' %}">
    <style>
        body { background: #ccc; }
        .login-container {
            background: #bdbdbd;
            width: 400px;
            margin: 60px auto;
            padding: 30px 20px;
            border-radius: 10px;
            box-shadow: 0 0 8px #333;
            text-align: center;
        }
        .login-container img {
            width: 60px;
            margin-bottom: 10px;
        }
        .login-container input[type="text"],
        .login-container input[type="password"] {
            width: 80%;
            padding: 8px;
            margin: 8px 0;
            border-radius: 6px;
            border: 2px solid #333;
        }
        .login-container button {
            padding: 8px 24px;
            border-radius: 6px;
            border: 1px solid #333;
            background: #fff;
            cursor: pointer;
        }
        .login-container h2 {
            margin-bottom: 0;
        }
        .login-container p {
            margin-top: 0;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <div class="login-container">
        <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Logo">
        <h2>ORTIZCORP</h2>
        <p>Seguridad Integral</p>
        <form method="post">
            {% csrf_token %}
            {% if messages %}
                <div style="margin-bottom:8px;color:#800">{% for message in messages %}{{ message }}<br>{% endfor %}</div>
            {% endif %}
            <input type="email" name="username" placeholder="Correo electrónico" required><br>
            <input type="password" name="password" placeholder="Contraseña" required>
            <button type="submit">Iniciar Sesion</button>
        </form>
    </div>
</body>
</html>
