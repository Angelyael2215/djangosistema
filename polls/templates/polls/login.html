{% extends 'polls/base.html' %}
{% block title %}Login - Orticorp{% endblock %}

{% block content %}
<div class="card" style="max-width:480px;margin:40px auto;text-align:center;">
    <img src="https://cdn-icons-png.flaticon.com/512/3135/3135715.png" alt="Logo" style="width:64px;margin-bottom:6px">
    <h2>ORTIZCORP</h2>
    <p class="subtitle">Seguridad Integral</p>
    <form method="post" style="margin-top:12px">
        {% csrf_token %}
        <div class="form-group">
            <input type="email" name="username" placeholder="Correo electrónico" required>
        </div>
        <div class="form-group">
            <input type="password" name="password" placeholder="Contraseña" required>
        </div>
        <button class="btn" type="submit">Iniciar Sesión</button>
        {% if messages %}
            <div style="margin-top:12px">
                {% for message in messages %}
                    <div class="alert alert-error">{{ message }}</div>
                {% endfor %}
            </div>
        {% endif %}
    </form>
</div>
{% endblock %}
