{% extends 'polls/base.html' %}
{% block title %}Registrar Trabajador - Orticorp{% endblock %}

{% block content %}
<div class="card" style="max-width:700px;margin:28px auto;">
  <h2 style="text-align:center;margin-bottom:12px;">Registrar Nuevo Trabajador</h2>
  {% if messages %}
    <div class="messages">{% for message in messages %}<div class="alert alert-{{ message.tags|default:'info' }}">{{ message }}</div>{% endfor %}</div>
  {% endif %}
  <form method="post" enctype="multipart/form-data">
    {% csrf_token %}
    <div class="form-group"><label for="nombre">Nombre:</label><input type="text" id="nombre" name="nombre" required></div>
    <div class="form-group"><label for="apellido">Apellido:</label><input type="text" id="apellido" name="apellido" required></div>
    <div class="form-group"><label for="estado">Estado:</label>
      <select id="estado" name="estado"><option value="Activo">Activo</option><option value="Inactivo">Inactivo</option><option value="Licencia">Licencia</option></select>
    </div>
    <div style="display:flex;gap:12px;align-items:center;justify-content:flex-end;margin-top:12px;">
      <a class="link" href="{% url 'inicio' %}">Volver al inicio</a>
      <button class="btn" type="submit">Registrar Trabajador</button>
    </div>
  </form>
</div>
{% endblock %}
