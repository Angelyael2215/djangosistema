{% extends 'polls/base.html' %}

{% block title %}Crear Período de Nómina{% endblock %}

{% block content %}
<div class="container">
    <h1>Crear Período de Nómina</h1>

    <form method="post" class="mt-4">
        {% csrf_token %}
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="tipo_periodo" class="form-label">Tipo de Período</label>
                    <select class="form-control" id="tipo_periodo" name="tipo_periodo" required>
                        <option value="SEMANAL">Semanal</option>
                        <option value="QUINCENAL" selected>Quincenal</option>
                        <option value="MENSUAL">Mensual</option>
                    </select>
                </div>
            </div>
        </div>
        <div class="row">
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="fecha_inicio" class="form-label">Fecha de Inicio</label>
                    <input type="date" class="form-control" id="fecha_inicio" name="fecha_inicio" required>
                </div>
            </div>
            <div class="col-md-6">
                <div class="mb-3">
                    <label for="fecha_fin" class="form-label">Fecha de Fin</label>
                    <input type="date" class="form-control" id="fecha_fin" name="fecha_fin" required>
                </div>
            </div>
        </div>
        <div class="mb-3">
            <label for="descripcion" class="form-label">Descripción (Opcional)</label>
            <input type="text" class="form-control" id="descripcion" name="descripcion" placeholder="Ej: Quincena Abril 2024">
        </div>

        <div class="mt-4">
            <button type="submit" class="btn btn-primary">Crear Período</button>
            <a href="{% url 'nomina:periodo_list' %}" class="btn btn-secondary">Cancelar</a>
        </div>
    </form>
</div>
{% endblock %}
