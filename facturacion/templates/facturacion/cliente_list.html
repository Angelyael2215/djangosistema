{% extends 'polls/base.html' %}
{% block title %}Clientes{% endblock %}
{% block content %}
<div class="card">
  <h1>Clientes</h1>
  <div style="margin-bottom:12px;"><a class="btn" href="{% url 'facturacion:cliente_create' %}">Nuevo Cliente</a></div>
  <table class="table">
    <thead><tr><th>Nombre</th><th>RFC</th><th>Email</th><th>Acciones</th></tr></thead>
    <tbody>
      {% for c in clientes %}
      <tr>
        <td>{{ c.nombre }}</td>
        <td>{{ c.rfc }}</td>
        <td>{{ c.email }}</td>
        <td><a class="link" href="{% url 'facturacion:cliente_edit' c.id %}">Editar</a></td>
      </tr>
      {% empty %}
      <tr><td colspan="4">No hay clientes</td></tr>
      {% endfor %}
    </tbody>
  </table>
</div>
{% endblock %}
